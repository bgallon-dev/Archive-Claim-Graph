version: "1"
domain: turnbull_refuge_archive
description: >
  Historical wildlife refuge annual reports, Turnbull National Wildlife
  Refuge, eastern Washington, 1930s-1970s.
resources:
  seed_entities: seed_entities.csv
  claim_type_patterns: claim_type_patterns.yaml
  claim_role_policy: claim_role_policy.yaml
  measurement_units: measurement_units.yaml
  measurement_species: measurement_species.yaml
  ocr_corrections: ocr_corrections.yaml
  claim_relation_compatibility: claim_relation_compatibility.yaml
  negative_entities: negative_entities.yaml
  derivation_registry: derivation_registry.yaml
  domain_schema: domain_schema.yaml
  concept_rules: concept_rules.yaml
  query_intent: query_intent.yaml
  validator_verbs: validator_verbs.yaml

year_validation:
  tolerance: 5
  action: flag

document_anchor:
  title_keywords:
    - tbl
    - turnbull
  entity_type: Refuge
  relation: ABOUT_REFUGE
  name: Turnbull Refuge
  normalized_form: turnbull refuge
  hierarchy_child_types: [Place]
  hierarchy_relation: LOCATED_IN_REFUGE
