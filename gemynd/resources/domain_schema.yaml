version: "1"

# Claim-entity relationship types in precedence order.
# First entry wins when deduplicating links on the same claim-entity pair.
claim_entity_relations:
  - relation: SPECIES_FOCUS
    entity_types: [Species]
  - relation: HABITAT_FOCUS
    entity_types: [Habitat]
  - relation: METHOD_FOCUS
    entity_types: [SurveyMethod]
  - relation: MANAGEMENT_TARGET
    entity_types: [Activity, Species]
  - relation: LOCATION_FOCUS
    entity_types: [Place, Refuge]
  - relation: SUBJECT_OF_CLAIM
    entity_types: [Person, Organization, Place, Refuge]
  - relation: TOPIC_OF_CLAIM
    entity_types: [Activity, Person, Organization, Place, Refuge]

# The relationship type used for claim-to-location links.
claim_location_relation: OCCURRED_AT
claim_location_entity_types: [Place, Refuge]

# All entity types that get their own Neo4j label (subtypes of :Entity).
entity_labels:
  - Refuge
  - Place
  - Person
  - Organization
  - Species
  - Activity
  - Period
  - Habitat
  - SurveyMethod

# Legacy claim type renames (old extractor output -> current canonical type).
legacy_renames:
  wildlife_count: population_estimate
  weather_condition: weather_observation

# Derivation roles: how role entities are resolved from claim links and
# which graph edges they produce when the writer emits observation/event
# records. Each role has a resolver spec and two edge specs (one per
# record type) because the writer uses different edge types for
# observations vs. events (e.g. OF_SPECIES vs. INVOLVED_SPECIES).
derivation_roles:
  resolution:
    species:
      source: entity_links
      relations: [SPECIES_FOCUS, MANAGEMENT_TARGET]
    habitat:
      source: entity_links
      relations: [HABITAT_FOCUS]
    survey_method:
      source: entity_links
      relations: [METHOD_FOCUS]
    refuge:
      source: location_links
      entity_type: Refuge
  observation_edges:
    species:       [Species,      OF_SPECIES]
    refuge:        [Refuge,       AT_REFUGE]
    habitat:       [Habitat,      IN_HABITAT]
    survey_method: [SurveyMethod, USED_METHOD]
  event_edges:
    species:       [Species,      INVOLVED_SPECIES]
    refuge:        [Refuge,       OCCURRED_AT]
    habitat:       [Habitat,      IN_HABITAT]
    survey_method: [SurveyMethod, USED_METHOD]
