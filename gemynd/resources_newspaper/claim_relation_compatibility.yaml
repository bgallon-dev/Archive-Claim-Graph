version: "1"
# Compatibility matrix: claim_type × relation_type → "strong" | "weak" | "forbidden"
#
# strong    — freely allowed; no penalty
# weak      — allowed but penalised (confidence −0.10) and flagged
# forbidden — blocked; link is dropped with diagnostic
#
# Unlisted (claim_type, relation_type) pairs default to "weak".
#
# The newspaper corpus has four relation types:
#   SUBJECT_OF_CLAIM     — the person or org performing an action
#   LOCATION_OF_CLAIM    — where something happened
#   ORGANIZATION_FOCUS   — the institutional actor or body
#   TOPIC_OF_CLAIM       — what is being discussed (broadest)

compatibility:

  # ── Railroad and Transportation ──────────────────────────────────────
  railroad_activity:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  freight_rate_dispute:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  depot_construction:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  # ── Labor and IWW ────────────────────────────────────────────────────
  labor_action:
    SUBJECT_OF_CLAIM: strong
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  free_speech_event:
    SUBJECT_OF_CLAIM: strong
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  worker_condition:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  labor_legal_action:
    SUBJECT_OF_CLAIM: strong
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: weak
    TOPIC_OF_CLAIM: weak

  # ── Indigenous Dispossession ─────────────────────────────────────────
  indigenous_policy:
    SUBJECT_OF_CLAIM: strong
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: strong

  # ── Agriculture and Land Economy ─────────────────────────────────────
  agricultural_condition:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: weak
    TOPIC_OF_CLAIM: strong

  land_policy_action:
    SUBJECT_OF_CLAIM: strong
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  farm_organization:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  # ── Turnbull Pre-History ─────────────────────────────────────────────
  turnbull_prehistory:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: strong

  # ── Spokane Development ──────────────────────────────────────────────
  civic_development:
    SUBJECT_OF_CLAIM: strong
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: strong

  infrastructure_project:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  # ── Mining and Extraction ────────────────────────────────────────────
  mining_activity:
    SUBJECT_OF_CLAIM: strong
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

  # ── Depression Era ───────────────────────────────────────────────────
  depression_relief:
    SUBJECT_OF_CLAIM: weak
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: strong

  # ── Education ────────────────────────────────────────────────────────
  education_event:
    SUBJECT_OF_CLAIM: strong
    LOCATION_OF_CLAIM: strong
    ORGANIZATION_FOCUS: strong
    TOPIC_OF_CLAIM: weak

