    LOCATION_OF_CLAIM: weak
    ORGANIZATION_FOCUS: weak
    TOPIC_OF_CLAIM: weak


# Preferred entity types per claim type — used to rank candidates when
# multiple span matches exist.  Types earlier in the list are preferred.
preferred_entity_types:
  railroad_activity:        [Organization, Place, Person]
  freight_rate_dispute:     [Organization, Place, Person]
  depot_construction:       [Place, Organization, Person]
  labor_action:             [Organization, Person, Place]
  free_speech_event:        [Person, Organization, Place]
  worker_condition:         [Organization, Place, Person]
  labor_legal_action:       [Person, Organization, Place]
  indigenous_policy:        [Organization, Place, Person]
  agricultural_condition:   [Place, Organization, Event]
  land_policy_action:       [Place, Person, Organization]
  farm_organization:        [Organization, Place, Person]
  turnbull_prehistory:      [Place, Organization, Person]
  civic_development:        [Organization, Place, Person]
  infrastructure_project:   [Place, Organization, Person]
  mining_activity:          [Place, Organization, Person]
  depression_relief:        [Organization, Place, Person]
  education_event:          [Organization, Place, Person]
  womens_civic_action:      [Organization, Person, Place]
  legal_notice:             [Person, Organization, Place]
