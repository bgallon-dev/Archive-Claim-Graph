version: "1"
description: >
  Spokane Regional Newspaper Corpus — Derivation Registry
  
  Maps each claim type to its observation_type, event_type, and
  required/optional entity types for the graph derivation layer.
  
  Design rationale:
    Unlike the Turnbull refuge domain (where most claims are ecological
    observations that produce Observation nodes), the newspaper corpus is
    primarily event-driven.  Most claim types produce Event nodes; only a
    subset (agricultural conditions, mining activity, worker conditions)
    produce Observation nodes for longitudinal tracking.
  
    observation_type: When non-null, build_observations() creates an
      Observation node linked to the claim via Claim-[:SUPPORTS]->Observation.
      Used for claims that describe measurable conditions over time.
  
    event_type: When non-null, build_events() creates an Event node
      linked via Claim-[:TRIGGERED]->Event.  Used for claims that describe
      discrete actions, incidents, or decisions.
  
    required_entities: Entity types that SHOULD be bound for a complete
      derivation.  Missing required entities are logged as warnings but
      do not block node creation.
  
    optional_entities: Entity types that enrich the derivation when
      present but whose absence is expected and unremarked.

entries:

  # ════════════════════════════════════════════════════════════════════
  # RAILROAD AND TRANSPORTATION
  # ════════════════════════════════════════════════════════════════════

  railroad_activity:
    observation_type: null
    event_type: TransportationEvent
    required_entities: [Organization]
    optional_entities: [Place, Person]

  freight_rate_dispute:
    observation_type: economic_condition
    event_type: RegulatoryEvent
    required_entities: [Organization]
    optional_entities: [Place, Person]

  depot_construction:
