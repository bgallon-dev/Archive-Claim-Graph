<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3;url=/auth/login">
  <title>Setup complete &mdash; Gemynd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-display: 'Source Serif 4', Georgia, serif;
      --bark-300: #C4A882;
      --bark-800: #3D2B1F;
      --parchment: #FAF7F2;
      --text-primary: #1A1410;
      --text-secondary: #6B6054;
      --accent-green-bg: #F0F6ED;
      --accent-green-text: #2A5C1A;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      font-size: 14px;
      background: var(--parchment);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .done-card {
      max-width: 400px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .logo {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: var(--bark-800);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .logo span {
      font-family: var(--font-display);
      color: var(--bark-300);
      font-size: 24px;
      font-weight: 500;
    }
    .check-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent-green-bg);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    h1 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 500;
      color: var(--accent-green-text);
      margin: 0 0 8px;
    }
    p { color: var(--text-secondary); font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="done-card">
    <div class="logo"><span>G</span></div>
    <div class="check-icon">
      <svg width="24" height="24" fill="none" stroke="var(--accent-green-text)" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1>Setup complete!</h1>
    <p>Your admin account has been created.<br>Redirecting to sign in&hellip;</p>
  </div>
</body>
</html>
