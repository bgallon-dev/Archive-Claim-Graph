{% extends "retrieval_stats_base.html" %}
{% block title %}Users - Gemynd{% endblock %}
{% block content %}
<p class="page-title">Users</p>
<p class="page-sub">Manage user accounts and roles</p>

<div style="margin-bottom:1.5rem">
  <button class="upload-btn" id="toggle-create" type="button" onclick="document.getElementById('create-form').style.display = document.getElementById('create-form').style.display === 'none' ? 'block' : 'none'">Create user</button>
</div>

<form id="create-form" style="display:none;margin-bottom:1.5rem;padding:1rem;background:var(--bark-50);border-radius:var(--radius-md);max-width:480px"
      hx-post="/users" hx-target="#user-table-body" hx-swap="afterbegin"
      hx-on::after-request="if(event.detail.successful){this.reset();this.style.display='none'}">
  <p class="section-heading" style="margin-top:0">New user</p>
  <div style="display:flex;flex-direction:column;gap:0.75rem">
    <div>
      <label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px">Email</label>
      <input type="email" name="email" required class="form-input" placeholder="user@example.org" style="width:100%">
    </div>
    <div>
      <label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px">Password (min 12 characters)</label>
      <input type="password" name="password" required minlength="12" class="form-input" style="width:100%">
    </div>
    <div>
      <label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px">Role</label>
      <select name="role" class="form-input" style="width:100%">
        <option value="readonly">readonly</option>
        <option value="archivist">archivist</option>
        <option value="admin">admin</option>
      </select>
    </div>
    <div style="margin-top:0.25rem">
      <button type="submit" class="upload-btn">Create</button>
    </div>
  </div>
</form>

<table class="mini-table">
  <thead>
    <tr>
      <th>Email</th>
      <th>Role</th>
      <th>Status</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="user-table-body">
    {% for user in users %}
    {% include "fragments/user_row.html" %}
    {% endfor %}
  </tbody>
</table>
{% endblock %}
